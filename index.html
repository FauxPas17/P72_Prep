<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeLab — Point72 BA Prep</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080a0f;
  --bg2: #0e1118;
  --surface: #131620;
  --surface2: #1a1f2e;
  --border: #1e2435;
  --border2: #252b3d;
  --accent: #00d4aa;
  --accent2: #f5a623;
  --blue: #4d8ef5;
  --red: #f56b6b;
  --text: #dde2ef;
  --text2: #8b93ab;
  --text3: #555e78;
  --green: #00d4aa;
  --py: #f5a623;
  --sql: #4d8ef5;
  --ai: #a855f7;
  --ai2: #c084fc;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:14px;line-height:1.6}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.app{display:grid;grid-template-rows:52px 1fr;height:100vh}
.main{display:grid;grid-template-columns:268px 1fr;overflow:hidden}

/* HEADER */
header{
  background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1.5rem;gap:1rem;
}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;letter-spacing:-0.03em;color:var(--text);display:flex;align-items:center;gap:0.5rem}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}
.header-center{display:flex;gap:0.2rem;align-items:center}
.mode-btn{
  padding:0.3rem 0.8rem;border-radius:5px;border:1px solid transparent;
  cursor:pointer;font-family:'Instrument Sans',sans-serif;font-size:0.76rem;font-weight:600;
  letter-spacing:0.03em;text-transform:uppercase;transition:all 0.15s;background:transparent;color:var(--text3);
}
.mode-btn.py-active{background:rgba(245,166,35,0.12);color:var(--py);border-color:rgba(245,166,35,0.25)}
.mode-btn.sql-active{background:rgba(77,142,245,0.12);color:var(--sql);border-color:rgba(77,142,245,0.25)}
.mode-btn.ai-active{background:rgba(168,85,247,0.12);color:var(--ai);border-color:rgba(168,85,247,0.25)}
.mode-btn.interview-active{background:rgba(0,212,170,0.12);color:var(--accent);border-color:rgba(0,212,170,0.25)}
.mode-btn:hover:not(.py-active):not(.sql-active):not(.ai-active):not(.interview-active){background:var(--surface);color:var(--text2)}
.header-right{display:flex;align-items:center;gap:0.75rem}
.xp-bar{display:flex;align-items:center;gap:0.5rem;background:var(--surface);border:1px solid var(--border);padding:0.25rem 0.75rem;border-radius:20px}
.xp-label{font-size:0.68rem;color:var(--text3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:0.05em}
.xp-val{font-size:0.78rem;color:var(--accent);font-family:'JetBrains Mono',monospace;font-weight:500}
.streak{font-size:0.75rem;color:var(--accent2);font-family:'JetBrains Mono',monospace}

/* SIDEBAR */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;padding:0.75rem 0}
.sidebar-header{
  padding:0.5rem 1.2rem 0.3rem;font-size:0.63rem;font-weight:600;letter-spacing:0.1em;
  text-transform:uppercase;color:var(--text3);font-family:'JetBrains Mono',monospace;
  display:flex;align-items:center;gap:0.5rem;margin-top:0.25rem;
}
.sidebar-header::after{content:'';flex:1;height:1px;background:var(--border)}
.lesson-item{
  display:flex;align-items:center;gap:0.7rem;padding:0.45rem 1.2rem;
  cursor:pointer;transition:all 0.12s;border-left:2px solid transparent;
}
.lesson-item:hover{background:var(--surface);color:var(--text)}
.lesson-item.active{background:var(--surface);color:var(--text)}
.lesson-item.active.py-item{border-left-color:var(--py)}
.lesson-item.active.sql-item{border-left-color:var(--sql)}
.lesson-item.active.ai-item{border-left-color:var(--ai)}
.lesson-item.active.int-item{border-left-color:var(--accent)}
.lesson-icon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-family:'JetBrains Mono',monospace;font-weight:600;flex-shrink:0}
.py-icon{background:rgba(245,166,35,0.12);color:var(--py)}
.sql-icon{background:rgba(77,142,245,0.12);color:var(--sql)}
.ai-icon{background:rgba(168,85,247,0.12);color:var(--ai)}
.int-icon{background:rgba(0,212,170,0.1);color:var(--accent)}
.lesson-meta{flex:1;min-width:0}
.lesson-name{font-size:0.81rem;font-weight:500;color:inherit;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lesson-sub{font-size:0.67rem;color:var(--text3);margin-top:1px}
.lesson-status{flex-shrink:0;font-size:0.65rem}
.status-done{color:var(--accent)}
.status-lock{color:var(--text3)}
.status-active{color:var(--accent2)}

/* CONTENT */
.content{display:grid;grid-template-rows:1fr;overflow:hidden}
.lesson-view{display:grid;grid-template-columns:1fr 1fr;overflow:hidden}
.lesson-left{overflow-y:auto;padding:2rem;border-right:1px solid var(--border)}
.lesson-right{display:flex;flex-direction:column;overflow:hidden}

/* LESSON TYPOGRAPHY */
.lesson-tag{display:inline-flex;align-items:center;gap:0.4rem;padding:0.2rem 0.6rem;border-radius:4px;font-size:0.63rem;font-family:'JetBrains Mono',monospace;font-weight:500;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:1.25rem}
.py-tag{background:rgba(245,166,35,0.12);color:var(--py);border:1px solid rgba(245,166,35,0.2)}
.sql-tag{background:rgba(77,142,245,0.12);color:var(--sql);border:1px solid rgba(77,142,245,0.2)}
.ai-tag{background:rgba(168,85,247,0.12);color:var(--ai);border:1px solid rgba(168,85,247,0.2)}
.int-tag{background:rgba(0,212,170,0.12);color:var(--accent);border:1px solid rgba(0,212,170,0.2)}
.lesson-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1.45rem;line-height:1.2;letter-spacing:-0.03em;margin-bottom:0.5rem;color:var(--text)}
.lesson-subtitle{color:var(--text2);font-size:0.84rem;margin-bottom:1.5rem;line-height:1.6}
.concept-block{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1.2rem;margin-bottom:0.9rem}
.concept-block h3{font-size:0.72rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:0.7rem}
.concept-block p{color:var(--text2);font-size:0.83rem;line-height:1.7}
.concept-block p+p{margin-top:0.4rem}
.highlight{color:var(--text);font-weight:500}
.code-inline{font-family:'JetBrains Mono',monospace;font-size:0.78rem;background:var(--bg);padding:0.1em 0.4em;border-radius:3px;color:var(--accent2)}
.ai-code-inline{font-family:'JetBrains Mono',monospace;font-size:0.78rem;background:var(--bg);padding:0.1em 0.4em;border-radius:3px;color:var(--ai2)}
.finance-callout{background:rgba(0,212,170,0.04);border:1px solid rgba(0,212,170,0.15);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:1rem 1.25rem;margin:1rem 0}
.ai-callout{background:rgba(168,85,247,0.04);border:1px solid rgba(168,85,247,0.15);border-left:3px solid var(--ai);border-radius:0 8px 8px 0;padding:1rem 1.25rem;margin:1rem 0}
.finance-callout .fc-label,.ai-callout .fc-label{font-size:0.63rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;margin-bottom:0.4rem}
.finance-callout .fc-label{color:var(--accent)}
.ai-callout .fc-label{color:var(--ai)}
.finance-callout p,.ai-callout p{font-size:0.82rem;color:var(--text2);line-height:1.6}
.finance-callout p b,.ai-callout p b{color:var(--text)}

/* DIAGRAM BLOCKS */
.diagram{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:1rem;margin:0.75rem 0;font-family:'JetBrains Mono',monospace;font-size:0.74rem;color:var(--text2);line-height:1.9;overflow-x:auto}
.diagram .d-purple{color:var(--ai2)}
.diagram .d-green{color:var(--green)}
.diagram .d-amber{color:var(--accent2)}
.diagram .d-blue{color:var(--blue)}
.diagram .d-arrow{color:var(--text3)}

/* EXERCISE PANEL */
.exercise-header{padding:0.9rem 1.25rem;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:space-between}
.ex-title{font-size:0.8rem;font-weight:600;color:var(--text);display:flex;align-items:center;gap:0.5rem}
.ex-badge{font-size:0.6rem;font-family:'JetBrains Mono',monospace;background:var(--surface2);color:var(--text3);padding:0.15rem 0.5rem;border-radius:3px}
.difficulty{font-size:0.7rem;display:flex;gap:0.2rem;align-items:center}
.diff-pip{width:8px;height:8px;border-radius:2px;background:var(--border2)}
.exercise-prompt{padding:0.9rem 1.25rem;border-bottom:1px solid var(--border);background:var(--surface);font-size:0.81rem;color:var(--text2);line-height:1.6}
.exercise-prompt strong{color:var(--text)}
.editor-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.editor-toolbar{padding:0.5rem 1rem;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.editor-lang{font-size:0.63rem;color:var(--text3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:0.08em}
.btn-run{padding:0.32rem 0.9rem;border-radius:5px;border:none;cursor:pointer;font-family:'Instrument Sans',sans-serif;font-size:0.76rem;font-weight:600;transition:all 0.15s;display:flex;align-items:center;gap:0.4rem}
.btn-run.py{background:rgba(245,166,35,0.15);color:var(--py)}
.btn-run.sql{background:rgba(77,142,245,0.15);color:var(--sql)}
.btn-run.ai{background:rgba(168,85,247,0.15);color:var(--ai)}
.btn-run:hover{filter:brightness(1.2);transform:translateY(-1px)}
.btn-run:active{transform:translateY(0)}
.code-editor{flex:1;width:100%;background:var(--bg);border:none;outline:none;resize:none;font-family:'JetBrains Mono',monospace;font-size:0.8rem;color:var(--text);padding:0.9rem 1.25rem;line-height:1.8}
.output-panel{height:130px;border-top:1px solid var(--border);background:var(--bg);overflow-y:auto;padding:0.7rem 1.25rem}
.output-label{font-size:0.6rem;color:var(--text3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.4rem}
.output-text{font-family:'JetBrains Mono',monospace;font-size:0.77rem;line-height:1.7;white-space:pre-wrap}
.out-success{color:var(--green)}
.out-error{color:var(--red)}
.out-info{color:var(--text2)}
.out-ai{color:var(--ai2)}
.out-table{border-collapse:collapse;margin-top:0.5rem;font-size:0.74rem}
.out-table th{padding:0.22rem 0.7rem;text-align:left;color:var(--text3);border-bottom:1px solid var(--border2);font-weight:500;font-family:'JetBrains Mono',monospace;font-size:0.66rem;text-transform:uppercase;letter-spacing:0.05em}
.out-table td{padding:0.18rem 0.7rem;color:var(--text2);border-bottom:1px solid rgba(30,36,53,0.5)}
.out-table tr:last-child td{border-bottom:none}

/* INTERVIEW */
.interview-view{overflow-y:auto;padding:2rem;display:grid;gap:1rem;grid-template-columns:1fr 1fr;align-content:start}
.int-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.2rem;cursor:pointer;transition:all 0.15s}
.int-card:hover{border-color:var(--border2);background:var(--surface2);transform:translateY(-1px)}
.int-card.open{border-color:rgba(0,212,170,0.3)}
.int-q{font-size:0.84rem;font-weight:600;color:var(--text);margin-bottom:0.5rem;line-height:1.4}
.int-tags{display:flex;gap:0.3rem;flex-wrap:wrap;margin-bottom:0.7rem}
.int-tag-pill{font-size:0.6rem;padding:0.15rem 0.5rem;border-radius:3px;font-family:'JetBrains Mono',monospace;font-weight:500}
.tag-sql{background:rgba(77,142,245,0.12);color:var(--sql)}
.tag-py{background:rgba(245,166,35,0.12);color:var(--py)}
.tag-ai{background:rgba(168,85,247,0.12);color:var(--ai)}
.tag-biz{background:rgba(0,212,170,0.1);color:var(--accent)}
.tag-mkt{background:rgba(245,107,107,0.12);color:var(--red)}
.int-answer{display:none;font-size:0.79rem;color:var(--text2);line-height:1.7;border-top:1px solid var(--border);padding-top:0.75rem;margin-top:0.75rem}
.int-card.open .int-answer{display:block}
.int-answer code{font-family:'JetBrains Mono',monospace;font-size:0.77rem;color:var(--accent2)}
.int-answer b{color:var(--text)}
.int-answer pre{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:0.75rem;margin:0.5rem 0;font-family:'JetBrains Mono',monospace;font-size:0.73rem;color:var(--text);overflow-x:auto;line-height:1.7}

/* DASHBOARD */
.dash-view{overflow-y:auto;padding:2rem;display:grid;gap:1.2rem;align-content:start}
.dash-hero{background:linear-gradient(135deg,rgba(0,212,170,0.07),rgba(168,85,247,0.04));border:1px solid rgba(0,212,170,0.15);border-radius:12px;padding:1.75rem;position:relative;overflow:hidden}
.dash-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(168,85,247,0.06),transparent 70%);border-radius:50%}
.dash-hero h1{font-family:'Syne',sans-serif;font-weight:800;font-size:1.55rem;letter-spacing:-0.04em;color:var(--text);margin-bottom:0.35rem}
.dash-hero h1 em{color:var(--accent);font-style:normal}
.dash-hero p{color:var(--text2);font-size:0.84rem;max-width:500px;line-height:1.6}
.dash-target{margin-top:1rem;padding:0.7rem 1rem;background:rgba(0,0,0,0.3);border-radius:8px;display:flex;align-items:center;gap:0.75rem}
.target-logo{width:32px;height:32px;border-radius:6px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:0.62rem;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);border:1px solid var(--border2)}
.target-text{font-size:0.79rem;color:var(--text2)}
.target-text b{color:var(--text);display:block;font-size:0.84rem;margin-bottom:0.1rem}
.dash-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:0.9rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem;text-align:center}
.stat-val{font-family:'Syne',sans-serif;font-weight:700;font-size:1.7rem;letter-spacing:-0.04em;margin-bottom:0.15rem}
.stat-val.green{color:var(--green)}
.stat-val.amber{color:var(--accent2)}
.stat-val.blue{color:var(--blue)}
.stat-val.purple{color:var(--ai)}
.stat-label{font-size:0.67rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;font-family:'JetBrains Mono',monospace}
.dash-tracks{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
.track-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.2rem;cursor:pointer;transition:all 0.15s}
.track-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.track-icon{font-size:1.4rem;margin-bottom:0.7rem}
.track-name{font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;letter-spacing:-0.02em;margin-bottom:0.25rem}
.track-desc{font-size:0.76rem;color:var(--text2);line-height:1.5;margin-bottom:0.7rem}
.track-progress-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:0.35rem}
.track-fill{height:100%;border-radius:2px;transition:width 0.5s ease}
.fill-py{background:var(--py)}
.fill-sql{background:var(--sql)}
.fill-ai{background:var(--ai)}
.fill-int{background:var(--accent)}
.track-pct{font-size:0.68rem;color:var(--text3);font-family:'JetBrains Mono',monospace}
.next-up{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.2rem;grid-column:1/-1}
.next-up h3{font-size:0.67rem;color:var(--text3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.7rem}
.next-items{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.5rem}
.next-item{display:flex;align-items:center;gap:0.7rem;padding:0.55rem;border-radius:6px;cursor:pointer;transition:background 0.1s}
.next-item:hover{background:var(--surface2)}
.next-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.62rem;font-family:'JetBrains Mono',monospace;font-weight:500;flex-shrink:0}
.next-num.py{background:rgba(245,166,35,0.15);color:var(--py)}
.next-num.sql{background:rgba(77,142,245,0.15);color:var(--sql)}
.next-num.ai{background:rgba(168,85,247,0.15);color:var(--ai)}
.next-info{flex:1}
.next-name{font-size:0.8rem;font-weight:500;color:var(--text)}
.next-track{font-size:0.68rem;color:var(--text3);margin-top:1px}
.next-arrow{color:var(--text3);font-size:0.75rem}

.hidden{display:none!important}
.fade-in{animation:fadeIn 0.2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.hint-btn{padding:0.28rem 0.7rem;border-radius:5px;border:1px solid var(--border2);cursor:pointer;font-family:'Instrument Sans',sans-serif;font-size:0.73rem;background:transparent;color:var(--text3);transition:all 0.15s}
.hint-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,212,170,0.05)}
.hint-box{padding:0.7rem 1.25rem;border-top:1px solid var(--border);background:rgba(0,212,170,0.04);font-size:0.77rem;color:var(--text2);line-height:1.6;display:none}
.hint-box.visible{display:block}
.hint-box b{color:var(--accent)}
.ai-badge{display:inline-flex;align-items:center;gap:0.3rem;font-size:0.65rem;font-family:'JetBrains Mono',monospace;color:var(--ai);background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.2);padding:0.15rem 0.5rem;border-radius:3px;margin-left:0.4rem}
</style>
</head>
<body>
<div class="app">

<!-- HEADER -->
<header>
  <div class="logo"><div class="logo-dot"></div>CodeLab</div>
  <div class="header-center">
    <button class="mode-btn" onclick="setMode('home')">Home</button>
    <button class="mode-btn" onclick="setMode('python')">Python</button>
    <button class="mode-btn" onclick="setMode('sql')">SQL</button>
    <button class="mode-btn" onclick="setMode('ai')">AI Engineering</button>
    <button class="mode-btn" onclick="setMode('interview')">Interview Prep</button>
  </div>
  <div class="header-right">
    <span class="streak">🔥 3-day streak</span>
    <div class="xp-bar">
      <span class="xp-label">XP</span>
      <span class="xp-val" id="xp-display">240</span>
    </div>
  </div>
</header>

<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="content" id="content-area"></div>
</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// CURRICULUM DATA
// ═══════════════════════════════════════════════════════════

const curriculum = {

python: [
  {
    id:'py1',label:'PY',type:'py',status:'done',
    name:'Variables & Types',sub:'int, float, str, bool',
    tag:'Python · Basics',title:'Variables & Data Types',
    subtitle:'Every piece of data in Python has a type. In finance you\'ll work with prices (float), instrument names (str), quantities (int), and flags (bool) constantly.',
    concepts:[
      {h:'What is a variable?',p:'A variable is a named container for a value. Think of it like a Bloomberg field: <span class="code-inline">PX_LAST</span> holds the last price. In Python: <span class="code-inline">px_last = 142.50</span>.'},
      {h:'The four primitive types',p:'<span class="highlight">int</span> — whole numbers (share qty, days to expiry)<br><span class="highlight">float</span> — decimals (price, rate, PnL)<br><span class="highlight">str</span> — text (ticker, currency pair "AUDUSD")<br><span class="highlight">bool</span> — True/False (is_active, has_crossed_limit)'}
    ],
    callout:{label:'Finance Context',text:'At <b>Point72/Cubist</b>, every trading system stores instrument metadata. A futures contract might have: <b>ticker="ESH25"</b> (str), <b>price=5204.25</b> (float), <b>contracts=50</b> (int), <b>is_hedged=True</b> (bool).'},

      {h:'Roles in a conversation',p:'API calls use a <span class="code-inline">messages</span> array with roles: <span class="code-inline">system</span> (background instructions), <span class="code-inline">user</span> (your input), <span class="code-inline">assistant</span> (model\'s reply). Multi-turn conversations are built by passing the full message history each time.'}

const interviewQs = [
  {q:"Walk me through what a systematic trading desk does vs a discretionary one.",tags:['biz','mkt'],a:`<b>Systematic desks</b> use quantitative models and algorithms to generate and execute trades — the PM sets parameters, the machine executes. Decisions are rules-based, repeatable, and backtestable.<br><br><b>Discretionary desks</b> rely on a PM's judgment and views on markets.<br><br>Point72/Cubist runs <b>systematic</b> equity and macro strategies. As a BA, you're supporting the infrastructure these systems run on.`},
  {q:"What SQL query finds the top 5 strategies by PnL this month?",tags:['sql'],a:`<pre>SELECT strategy, SUM(pnl) AS total_pnl\nFROM pnl_daily\nWHERE trade_date >= DATE_TRUNC('month', CURRENT_DATE)\nGROUP BY strategy\nORDER BY total_pnl DESC\nLIMIT 5;</pre>Key: <b>GROUP BY</b> to aggregate, <b>ORDER BY DESC</b> to rank, <b>LIMIT</b> to cap, <b>WHERE</b> with date filter.`},
  {q:"Describe what a futures contract is and how it differs from a stock.",tags:['mkt'],a:`A <b>futures contract</b> is an agreement to buy/sell an asset at a specified price on a future date. You don't own the asset immediately — you have an obligation.<br><br>Vs stocks: stocks are <b>equity ownership</b> with no expiry. Futures <b>expire</b>, have <b>leverage</b> built-in via margin, and trade on exchanges like CME. Point72 runs strategies in global equities, futures, and FX.`},
  {q:"Write a Python function to check if a trade dict is missing required fields.",tags:['py'],a:`<pre>REQUIRED = ["ticker","qty","price","desk","trade_date"]\n\ndef validate_trade(trade: dict) -> list:\n    return [f for f in REQUIRED if f not in trade]\n\ntrade = {"ticker":"AAPL","qty":100,"price":182.5}\nprint(validate_trade(trade))\n# → ['desk', 'trade_date']</pre>This pattern — validating incoming data dicts — is common in onboarding new PM teams into production.`},
  {q:"What is broker reconciliation and why does it matter?",tags:['biz'],a:`<b>Broker reconciliation</b> compares your internal trade records against what the broker reports. Mismatches indicate execution errors, booking errors, or data feed issues.<br><br>As a BA at Point72, you'd run daily rec processes, investigate breaks, and coordinate with Ops, Tech, and brokers. Unresolved breaks → incorrect PnL, compliance issues, or failed settlements.`},
  {q:"What is MCP and why is it important for AI integration?",tags:['ai','biz'],a:`<b>MCP (Model Context Protocol)</b> is an open standard by Anthropic that lets AI models connect to external tools, databases, and services in a standardised way.<br><br>Before MCP: every AI integration required custom code. With MCP, you build a server once and any MCP-compatible AI can use it.<br><br><pre># MCP server exposes tools:\nget_pnl(desk, date) → returns PnL data\nquery_positions() → returns current book\nsend_alert(msg) → triggers notification</pre>Quant firms are evaluating MCP to connect AI to their trade infrastructure without rebuilding integrations for each model.`},
  {q:"Explain the difference between an AI tool call and a regular function call.",tags:['ai','py'],a:`A <b>regular function call</b> is deterministic — you explicitly call <code>get_pnl("Macro", "2025-01-15")</code> in your code.<br><br>An <b>AI tool call</b> is dynamic — you give Claude a set of available tools and a natural language goal, and Claude <i>decides</i> which tool to call, with what arguments, based on reasoning.<br><br><pre>tools = [get_pnl_tool, list_trades_tool, send_alert_tool]\n# Claude sees goal: "Check if Macro desk is reconciled"\n# Claude decides: call check_reconciliation("Macro", today)\n# Claude interprets result and responds</pre>This is the foundation of AI agents — autonomous multi-step tool use.`},
  {q:"How would you use embeddings to improve trade note search?",tags:['ai','py'],a:`<b>Traditional search</b> uses keyword matching — searching for "NVDA earnings" misses notes that say "Nvidia quarterly results."<br><br><b>Embedding search</b> converts each note to a vector (a list of ~1536 numbers capturing meaning). To search, convert the query to a vector and find notes with the closest vectors.<br><br><pre>from openai import OpenAI\nclient = OpenAI()\n\ndef embed(text):\n    r = client.embeddings.create(\n        input=text,\n        model="text-embedding-3-small"\n    )\n    return r.data[0].embedding\n\nquery_vec = embed("Nvidia quarterly results")\n# Compare to stored note vectors → semantic match</pre>This powers intelligent document retrieval across research notes, PM commentary, and trade rationale.`},
  {q:"What is the difference between GROUP BY and HAVING in SQL?",tags:['sql'],a:`<b>WHERE</b> filters rows <i>before</i> aggregation.<br><b>HAVING</b> filters groups <i>after</i> aggregation.<br><br><pre>SELECT desk, COUNT(*) AS trades, SUM(notional) AS total\nFROM trades\nWHERE trade_date >= '2025-01-01'   -- row filter first\nGROUP BY desk\nHAVING SUM(notional) > 10000000;  -- group filter after</pre>You cannot use SUM() inside a WHERE clause — that's what HAVING is for.`},
  {q:"How would you explain a Large Language Model to a non-technical PM?",tags:['ai','biz'],a:`"Imagine you trained a system by having it read every book, research paper, and news article ever written — billions of documents. It learned patterns so well that it can now write, reason, and answer questions like a very well-read analyst.<br><br>When you ask it something, it doesn't look things up — it generates a response token by token, each word chosen based on what's most likely to come next given everything it's learned and everything you've told it so far.<br><br>Its weakness: it doesn't know what happened after its training cutoff, it can't access live data unless you give it tools, and it can sometimes confidently say things that are wrong (hallucination). Those limitations are why we pair it with real-time data tools and always verify outputs."<br><br>This answer demonstrates both technical understanding and the communication skill central to the BA role.`}
];

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.className='mode-btn');
  const btns = document.querySelectorAll('.mode-btn');
  const modes = ['home','python','sql','ai','interview'];
  const activeClasses = ['','py-active','sql-active','ai-active','interview-active'];
  const idx = modes.indexOf(m);
  if(idx>=0) btns[idx].classList.add(activeClasses[idx]);

  renderSidebar();
  if(m==='home') renderHome();
  else if(m==='interview') renderInterview();
  else {
    const lessons = m==='python'?curriculum.python:m==='sql'?curriculum.sql:curriculum.ai;
    if(activeLesson && lessons.find(l=>l.id===activeLesson.id)) renderLesson(activeLesson);
    else {
      const first = lessons.find(l=>l.status!=='locked')||lessons[0];
      activeLesson = first;
      renderLesson(first);
    }
  }
}

  let html='<div class="interview-view fade-in">';
  interviewQs.forEach((q,i)=>{
    const tags=q.tags.map(t=>`<span class="int-tag-pill tag-${t}">${t.toUpperCase()}</span>`).join('');
    html+=`<div class="int-card" id="iq${i}" onclick="toggleIntQ(${i})">
      <div class="int-q">${q.q}</div>
      <div class="int-tags">${tags}</div>
      <div style="font-size:0.68rem;color:var(--text3);font-family:'JetBrains Mono',monospace">Click to reveal ↓</div>
      <div class="int-answer">${q.a}</div>
    </div>`;
  });
  html+='</div>';
  content.innerHTML=html;
}

// ═══════════════════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════════════════

function toggleIntQ(i){
  document.getElementById(`iq${i}`).classList.toggle('open');
}

function toggleHint(){
  const box=document.getElementById('hint-box');
  if(box) box.classList.toggle('visible');
}

function runCode(lessonId){
  const all=[...curriculum.python,...curriculum.sql,...curriculum.ai];
  const lesson=all.find(l=>l.id===lessonId);
  if(!lesson) return;
  const code=document.getElementById(`editor-${lessonId}`).value.trim();
  const outEl=document.getElementById(`output-${lessonId}`);

  // SQL simulated
  if(lesson.exercise.isSql){
    const res=lesson.exercise.simulatedResult;
    const blanks=(code.match(/= *\n/g)||[]).length + (code.match(/> *;/g)||[]).length + (code.match(/ON t\. = i\./g)||[]).length;
    if(blanks>0||code===lesson.exercise.starter.trim()){
      outEl.className='output-text out-error';
      outEl.textContent='⚠ Fill in the blanks before running.';
      return;
    }
    let html=`<span class="out-success">✓ ${res.rows.length} row(s) returned</span>\n`;
    html+=`<table class="out-table"><thead><tr>${res.cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>`;
    res.rows.forEach(r=>{html+=`<tr>${r.map(v=>`<td>${v}</td>`).join('')}</tr>`;});
    html+='</tbody></table>';
    outEl.className='output-text';
    outEl.innerHTML=html;
    awardXP(lessonId,50);
    return;
  }

  // AI lessons — simulated output
  if(lesson.exercise.isAi){
    const checks=aiCheck(lessonId,code);
    if(checks.error){
      outEl.className='output-text out-error';
      outEl.textContent=`⚠ ${checks.error}`;
      return;
    }
    outEl.className='output-text';
    simulateStream(outEl, lesson.exercise.simulatedAiOutput, lessonId);
    return;
  }

  // Python — pattern matching
  const checks=pyCheck(lessonId,code);
  if(checks.error){
    outEl.className='output-text out-error';
    outEl.textContent=`⚠ ${checks.error}`;
    return;
  }
  outEl.className='output-text';
  outEl.innerHTML=`<span class="out-success">✓ Ran successfully!</span>\n\n${lesson.exercise.expectedOutput}`;
  awardXP(lessonId,40);
}

function simulateStream(el, text, lessonId){
  el.innerHTML='<span class="out-ai">⬡ Simulating AI response...</span>\n\n';
  let i=0;
  const chars=text.split('');
  const interval=setInterval(()=>{
    if(i<chars.length){
      el.textContent=el.textContent.replace('⬡ Simulating AI response...\n\n','')+chars[i];
      i++;
    } else {
      clearInterval(interval);
      awardXP(lessonId,60);
    }
  },6);
}

function aiCheck(id,code){
  if(id==='ai1'){
    if(!code.includes('system')&&!code.toLowerCase().includes('trading')) return {error:'Add a system prompt describing the assistant role.'};
    if(!code.includes('content')&&code.includes('""')) return {error:'Fill in both the system and user message content.'};
  }
  if(id==='ai2'){
    if(!code.includes('get_pnl_summary')) return {error:'Tool name should be "get_pnl_summary".'};
    if(!code.includes('"desk"')) return {error:'Add "desk" as a property name.'};
    if(!code.includes('"date"')) return {error:'Add "date" as a property name.'};
  }
  if(id==='ai3'){
    if(!code.includes('get_daily_pnl')) return {error:'Tool name should be "get_daily_pnl".'};
    if(!code.includes('description')) return {error:'Add a description for the tool.'};
  }
  if(id==='ai4'){
    if(!code.includes('useState')) return {error:'Use useState to define your state variables.'};
    if(!code.includes('[]')) return {error:'messages state should initialise as an empty array [].'};
    if(!code.includes('false')) return {error:'loading state should initialise as false.'};
    if(!code.includes('useEffect')) return {error:'Add a useEffect hook.'};
  }
  if(id==='ai5'){
    if(!code.includes('gpt-4o')) return {error:'Set the model to "gpt-4o".'};
    if(!code.includes('system')&&code.includes('""')) return {error:'Fill in the system and user messages.'};
  }
  if(id==='ai6'){
    if(!code.includes('get_pnl')) return {error:'Your agent should call get_pnl as the first action.'};
    if(!code.includes('check_reconciliation')&&!code.includes('reconcil')) return {error:'Your agent should also call check_reconciliation.'};
  }
  return {};
}

function pyCheck(id,code){
  if(id==='py1'){if(!code.includes('ESH25'))return{error:"ticker should be 'ESH25'"};if(!code.includes('5204.25'))return{error:"price should be 5204.25"};if(!code.includes('True'))return{error:"is_active should be True"}}
  if(id==='py2'){if(!code.includes('NVDA')||!code.includes('AAPL'))return{error:"positions should contain AAPL, NVDA, TSLA"};if(!code.includes('Quant Equity'))return{error:"desk should be 'Quant Equity'"}}
  if(id==='py3'){if(!code.includes('pnl > 0'))return{error:"use pnl > 0 for PROFIT"};if(!code.includes('pnl == 0'))return{error:"use pnl == 0 (double equals) for FLAT"}}
  if(id==='py4'){if(!code.includes('price * quantity')&&!code.includes('price*quantity'))return{error:"return price * quantity"}}
  if(id==='py5'){if(!code.includes('> 0'))return{error:"filter with pnl > 0"};if(!code.includes('"desk"')&&!code.includes("'desk'"))return{error:"groupby 'desk'"}}
  return{};
}

function awardXP(lessonId,pts){
  if(!completedLessons.has(lessonId)){
    completedLessons.add(lessonId);
    xp+=pts;
    document.getElementById('xp-display').textContent=xp;
    renderSidebar();
  }
}

setMode('home');
